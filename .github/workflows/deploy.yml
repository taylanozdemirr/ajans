name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  push:
    branches: [ main, master ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20



      - name: Run Build and Capture Logs
        run: |
          set +e
          echo "Starting build process..." > full_build.log
          echo "=== NPM INSTALL ===" >> full_build.log
          cd frontend
          npm install --legacy-peer-deps >> ../full_build.log 2>&1
          echo "=== NPM BUILD ===" >> ../full_build.log
          VITE_USE_MOCK=true npm run build >> ../full_build.log 2>&1
          echo "=== LS DIST ===" >> ../full_build.log
          ls -la dist >> ../full_build.log 2>&1
          cd ..
          echo "=== DONE ===" >> full_build.log
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Push log to ci-logs branch
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git checkout -b ci-logs-debug || git checkout ci-logs-debug
          git add full_build.log
          git commit -m "chore: add full build log" || true
          git push -u origin ci-logs-debug --force

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
